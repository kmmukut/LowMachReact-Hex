name: Compile Reports

on:
  push:
    branches: ["main", "dev"]
    paths:
      - 'reports/**/*.tex'
      - '.github/workflows/compile-reports.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile Technical Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: reports/technical_report/main.tex
          args: "-pdf -jobname=report -output-directory=reports/technical_report"

      - name: Compile Presentation
        uses: xu-cheng/latex-action@v3
        with:
          root_file: reports/presentation/main.tex
          args: "-pdf -jobname=presentation -output-directory=reports/presentation"

      - name: Auto Commit PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update compiled PDFs [skip ci]"
          file_pattern: 'reports/**/*.pdf'

      - name: Upload compiled PDFs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-reports
          path: |
            reports/technical_report/report.pdf
            reports/presentation/presentation.pdf
