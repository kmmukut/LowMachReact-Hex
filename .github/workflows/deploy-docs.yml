name: Deploy Documentation

on:
  push:
    branches:
      - main

# Allow this job to clone the repo and write to the gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install FORD Compiler
        run: |
          python -m pip install --upgrade pip
          pip install ford

      - name: Compile FORD HTML Documentation
        run: |
          ford ford.yml

      - name: Deploy Compiled Documentation to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
